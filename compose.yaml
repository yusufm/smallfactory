services:
  smallfactory:
    build:
      context: .
    image: smallfactory:local
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      SF_DATA_PATH: /data
      SF_REPO_PATH: /data/datarepo
      SF_REPO_NAME: datarepo
    volumes:
      - smallfactory-data:/data
    restart: unless-stopped

volumes:
  smallfactory-data:
